name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

permissions:
  actions: read
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Laravel API Tests
  # ─────────────────────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests (Laravel/PHPUnit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/sports-yeti-api

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: sports_yeti_test
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_pgsql, redis, bcmath, gd
          coverage: xdebug

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Configure test environment
        run: |
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=pgsql/' .env
          sed -i 's/# DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/# DB_PORT=.*/DB_PORT=5432/' .env
          sed -i 's/# DB_DATABASE=.*/DB_DATABASE=sports_yeti_test/' .env
          sed -i 's/# DB_USERNAME=.*/DB_USERNAME=postgres/' .env
          sed -i 's/# DB_PASSWORD=.*/DB_PASSWORD=password/' .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_DATABASE=sports_yeti_test" >> .env
          echo "DB_USERNAME=postgres" >> .env
          echo "DB_PASSWORD=password" >> .env
          sed -i 's/CACHE_STORE=.*/CACHE_STORE=redis/' .env
          sed -i 's/REDIS_HOST=.*/REDIS_HOST=127.0.0.1/' .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Generate JWT secret
        run: php artisan jwt:secret --force

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Run Laravel Pint (code style)
        run: vendor/bin/pint --test

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --testdox --colors=always

  # ─────────────────────────────────────────────────────────────────────────────
  # Mobile App Build Verification
  # ─────────────────────────────────────────────────────────────────────────────
  mobile-build:
    name: Mobile App Build Verification
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type check (mobile)
        run: npx nx run sports-yeti:typecheck
        continue-on-error: false

      - name: Lint mobile app
        run: npx nx run sports-yeti:lint

      - name: Run mobile unit tests
        run: npx nx run sports-yeti:test --passWithNoTests

      - name: Verify Expo export (web)
        run: npx nx run sports-yeti:export --platform web
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Nx Workspace (lint, test, build, e2e)
  # ─────────────────────────────────────────────────────────────────────────────
  nx-workspace:
    name: Nx Workspace CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # Uncomment this line to enable task distribution
      # - run: npx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="e2e-ci"

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci --legacy-peer-deps
      - run: npx playwright install --with-deps

      # Prepend any command with "nx-cloud record --" to record its logs to Nx Cloud
      # - run: npx nx-cloud record -- echo Hello World
      # When you enable task distribution, run the e2e-ci task instead of e2e
      - run: npx nx run-many -t lint test build e2e
      # Nx Cloud recommends fixes for failures to help you get CI green faster. Learn more: https://nx.dev/ci/features/self-healing-ci
      - run: npx nx fix-ci
        if: always()
